# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

# jsondiffpatch's XSS advisory (CVE-2025-9910 / GHSA-33vc-wfww-vjfv) affects only
# its HTML formatter, which this service never imports — it only uses
# create()/diff() to compute deltas stored server-side in CouchDB, so the
# vulnerable path is unreachable. The fix (0.7.2) is ESM-only and incompatible
# with this CommonJS service, so 0.5.0 is pinned intentionally.
[[ignore]]
linters = ["trivy", "osv-scanner"]
rules = ["CVE-2025-9910", "GHSA-33vc-wfww-vjfv"]

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true


[[plugin]]
name = "actionlint"

[[plugin]]
name = "checkov"

[[plugin]]
name = "dockerfmt"

[[plugin]]
name = "dotenv-linter"
mode = "comment"

[[plugin]]
name = "eslint"
version = "9.32.0"
package_file = "package.json"
package_filters = ["eslint", "jest", "prettier"]

[[plugin]]
name = "hadolint"

[[plugin]]
name = "markdownlint"
mode = "comment"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "prettier"
version = "3.6.2"
package_file = "package.json"
package_filters = ["prettier"]

[[plugin]]
name = "radarlint-iac"
mode = "monitor"

[[plugin]]
name = "radarlint-js"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "trivy"
drivers = [
  "config",
  "fs-vuln",
]

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "yamllint"
